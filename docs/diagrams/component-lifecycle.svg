<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 280" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <filter id="ds" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 8" refX="10" refY="4" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#1B5E8A"/>
    </marker>
    <marker id="arG" viewBox="0 0 10 8" refX="10" refY="4" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#27AE60"/>
    </marker>
    <marker id="arO" viewBox="0 0 10 8" refX="10" refY="4" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#E67E22"/>
    </marker>
  </defs>

  <rect width="700" height="280" rx="12" fill="#F7F9FC"/>

  <text x="350" y="30" text-anchor="middle" fill="#0F3652" font-size="18" font-weight="700">Component Lifecycle (Phase 3 State Machine)</text>

  <!-- Pending -->
  <rect x="30" y="90" width="120" height="55" rx="10" fill="#E8E8E8" stroke="#BBB" stroke-width="1.5" filter="url(#ds)"/>
  <text x="90" y="123" text-anchor="middle" fill="#555" font-size="13" font-weight="700">Pending</text>

  <!-- Arrow → In Progress -->
  <line x1="150" y1="117" x2="205" y2="117" stroke="#1B5E8A" stroke-width="2" marker-end="url(#ar)"/>
  <text x="178" y="109" text-anchor="middle" fill="#1B5E8A" font-size="9">/design-component</text>

  <!-- In Progress -->
  <rect x="210" y="90" width="130" height="55" rx="10" fill="#EBF5FB" stroke="#1B5E8A" stroke-width="1.5" filter="url(#ds)"/>
  <text x="275" y="123" text-anchor="middle" fill="#1B5E8A" font-size="13" font-weight="700">In Progress</text>

  <!-- Arrow → Awaiting -->
  <line x1="340" y1="117" x2="395" y2="117" stroke="#1B5E8A" stroke-width="2" marker-end="url(#ar)"/>
  <text x="368" y="109" text-anchor="middle" fill="#1B5E8A" font-size="9">proposal ready</text>

  <!-- Awaiting Acceptance -->
  <rect x="400" y="90" width="150" height="55" rx="10" fill="#FEF9E7" stroke="#F4D03F" stroke-width="1.5" filter="url(#ds)"/>
  <text x="475" y="118" text-anchor="middle" fill="#7D6608" font-size="12" font-weight="700">Awaiting</text>
  <text x="475" y="133" text-anchor="middle" fill="#7D6608" font-size="12" font-weight="700">Acceptance</text>

  <!-- Arrow → Accepted -->
  <line x1="550" y1="117" x2="595" y2="117" stroke="#27AE60" stroke-width="2" marker-end="url(#arG)"/>
  <text x="573" y="109" text-anchor="middle" fill="#27AE60" font-size="9">/accept</text>

  <!-- Accepted -->
  <rect x="600" y="90" width="80" height="55" rx="10" fill="#EAFAF1" stroke="#27AE60" stroke-width="2" filter="url(#ds)"/>
  <text x="640" y="123" text-anchor="middle" fill="#1E8449" font-size="13" font-weight="700">Accepted</text>
  <!-- Lock icon hint -->
  <text x="640" y="138" text-anchor="middle" fill="#82E0AA" font-size="9">🔒 locked</text>

  <!-- Refine loop: Awaiting → In Progress -->
  <path d="M 450 145 Q 450 210, 340 210 Q 275 210, 275 145" stroke="#E67E22" stroke-width="2" fill="none" marker-end="url(#arO)"/>
  <text x="380" y="228" text-anchor="middle" fill="#E67E22" font-size="10" font-weight="600">/refine — sends back with feedback</text>

  <!-- Note about enforcement -->
  <rect x="130" y="248" width="440" height="24" rx="12" fill="#0F3652"/>
  <text x="350" y="265" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">Enforced by validate-transition.py — accepted components cannot be reverted</text>
</svg>
