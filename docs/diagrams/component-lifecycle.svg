<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 360" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <filter id="ds" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 8" refX="10" refY="4" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#1B5E8A"/>
    </marker>
    <marker id="arG" viewBox="0 0 10 8" refX="10" refY="4" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#27AE60"/>
    </marker>
    <marker id="arO" viewBox="0 0 10 8" refX="10" refY="4" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#E67E22"/>
    </marker>
    <marker id="arR" viewBox="0 0 10 8" refX="10" refY="4" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#C0392B"/>
    </marker>
  </defs>

  <rect width="780" height="360" rx="12" fill="#F7F9FC"/>

  <text x="390" y="30" text-anchor="middle" fill="#0F3652" font-size="18" font-weight="700">Component Lifecycle (Phase 3 State Machine)</text>

  <!-- Pending -->
  <rect x="30" y="80" width="110" height="50" rx="10" fill="#E8E8E8" stroke="#BBB" stroke-width="1.5" filter="url(#ds)"/>
  <text x="85" y="110" text-anchor="middle" fill="#555" font-size="13" font-weight="700">Pending</text>

  <!-- Arrow: Pending → In Progress -->
  <line x1="140" y1="105" x2="200" y2="105" stroke="#1B5E8A" stroke-width="2" marker-end="url(#ar)"/>
  <text x="170" y="97" text-anchor="middle" fill="#1B5E8A" font-size="8">/design-component</text>

  <!-- In Progress -->
  <rect x="205" y="80" width="130" height="50" rx="10" fill="#EBF5FB" stroke="#1B5E8A" stroke-width="1.5" filter="url(#ds)"/>
  <text x="270" y="110" text-anchor="middle" fill="#1B5E8A" font-size="13" font-weight="700">In Progress</text>

  <!-- Arrow: In Progress → Awaiting -->
  <line x1="335" y1="105" x2="395" y2="105" stroke="#1B5E8A" stroke-width="2" marker-end="url(#ar)"/>
  <text x="365" y="97" text-anchor="middle" fill="#1B5E8A" font-size="8">proposal ready</text>

  <!-- Awaiting Acceptance -->
  <rect x="400" y="80" width="150" height="50" rx="10" fill="#FEF9E7" stroke="#F4D03F" stroke-width="1.5" filter="url(#ds)"/>
  <text x="475" y="100" text-anchor="middle" fill="#7D6608" font-size="12" font-weight="700">Awaiting</text>
  <text x="475" y="117" text-anchor="middle" fill="#7D6608" font-size="12" font-weight="700">Acceptance</text>

  <!-- Arrow: Awaiting → Accepted -->
  <line x1="550" y1="105" x2="610" y2="105" stroke="#27AE60" stroke-width="2" marker-end="url(#arG)"/>
  <text x="580" y="97" text-anchor="middle" fill="#27AE60" font-size="8">/accept</text>

  <!-- Accepted -->
  <rect x="615" y="80" width="100" height="50" rx="10" fill="#EAFAF1" stroke="#27AE60" stroke-width="2" filter="url(#ds)"/>
  <text x="665" y="110" text-anchor="middle" fill="#1E8449" font-size="13" font-weight="700">Accepted</text>

  <!-- Refine loop: Awaiting → In Progress -->
  <path d="M 450 130 Q 450 185, 365 185 Q 270 185, 270 130" stroke="#E67E22" stroke-width="2" fill="none" marker-end="url(#arO)"/>
  <text x="370" y="205" text-anchor="middle" fill="#E67E22" font-size="10" font-weight="600">/refine — sends back with feedback</text>

  <!-- Needs Review -->
  <rect x="400" y="240" width="150" height="50" rx="10" fill="#FDEDEC" stroke="#C0392B" stroke-width="1.5" filter="url(#ds)"/>
  <text x="475" y="260" text-anchor="middle" fill="#C0392B" font-size="12" font-weight="700">Needs</text>
  <text x="475" y="277" text-anchor="middle" fill="#C0392B" font-size="12" font-weight="700">Review</text>

  <!-- Arrow: Accepted → Needs Review (reopen) -->
  <path d="M 665 130 Q 665 265, 550 265" stroke="#C0392B" stroke-width="2" fill="none" stroke-dasharray="6 4" marker-end="url(#arR)"/>
  <text x="640" y="200" text-anchor="end" fill="#C0392B" font-size="9" font-weight="600">/reopen</text>

  <!-- Arrow: Needs Review → In Progress -->
  <path d="M 400 265 Q 270 265, 270 130" stroke="#1B5E8A" stroke-width="2" fill="none" marker-end="url(#ar)"/>
  <text x="310" y="255" text-anchor="middle" fill="#1B5E8A" font-size="9">re-design</text>

  <!-- Note about enforcement -->
  <rect x="110" y="320" width="560" height="28" rx="14" fill="#0F3652"/>
  <text x="390" y="339" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">Enforced by validate-transition.py — needs-review cannot jump directly to accepted</text>
</svg>
