<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <filter id="ds" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 8" refX="10" refY="4" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#1B5E8A"/>
    </marker>
  </defs>

  <rect width="960" height="440" rx="12" fill="#F7F9FC"/>

  <text x="480" y="34" text-anchor="middle" fill="#0F3652" font-size="20" font-weight="700">Phase-Gated Workflow — PRD to Architecture Document</text>

  <!-- Core principle banner -->
  <rect x="210" y="48" width="540" height="28" rx="14" fill="#fff" stroke="#1B5E8A" stroke-width="1.2"/>
  <text x="480" y="67" text-anchor="middle" fill="#1B5E8A" font-size="12" font-weight="600">Core Principle: AI proposes and challenges · Human decides at every gate</text>

  <!-- Phase boxes -->
  <!-- Phase 1 -->
  <rect x="30" y="100" width="195" height="195" rx="10" fill="#fff" stroke="#DDE5EE" stroke-width="1.2" filter="url(#ds)"/>
  <rect x="30" y="100" width="195" height="40" rx="10" fill="#1B5E8A"/>
  <rect x="30" y="120" width="195" height="20" fill="#1B5E8A"/>
  <text x="128" y="126" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">1 · Evaluate</text>
  <text x="45" y="162" fill="#333" font-size="11" font-weight="600">What it does:</text>
  <text x="45" y="178" fill="#555" font-size="10.5">Analyze PRD, extract reqs,</text>
  <text x="45" y="192" fill="#555" font-size="10.5">identify gaps and risks</text>
  <text x="45" y="214" fill="#333" font-size="11" font-weight="600">Command: /analyze-prd</text>
  <text x="45" y="234" fill="#333" font-size="11" font-weight="600">Output:</text>
  <text x="45" y="250" fill="#555" font-size="10.5">phase1-evaluation.md</text>
  <!-- Progress bar -->
  <rect x="45" y="270" width="165" height="6" rx="3" fill="#E8E8E8"/>
  <rect x="45" y="270" width="41" height="6" rx="3" fill="#F5B041"/>

  <!-- Gate 1 -->
  <rect x="235" y="163" width="50" height="75" rx="6" fill="#E8F8F0" stroke="#27AE60" stroke-width="1.2"/>
  <text x="260" y="192" text-anchor="middle" fill="#1E8449" font-size="10" font-weight="700">GATE</text>
  <text x="260" y="207" text-anchor="middle" fill="#555" font-size="8">Accept</text>
  <text x="260" y="217" text-anchor="middle" fill="#555" font-size="8">analysis</text>
  <text x="260" y="227" text-anchor="middle" fill="#555" font-size="8">or clarify</text>
  <line x1="225" y1="200" x2="235" y2="200" stroke="#1B5E8A" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- Phase 2 -->
  <rect x="295" y="100" width="195" height="195" rx="10" fill="#fff" stroke="#DDE5EE" stroke-width="1.2" filter="url(#ds)"/>
  <rect x="295" y="100" width="195" height="40" rx="10" fill="#1B5E8A"/>
  <rect x="295" y="120" width="195" height="20" fill="#1B5E8A"/>
  <text x="393" y="126" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">2 · Decide</text>
  <text x="310" y="162" fill="#333" font-size="11" font-weight="600">What it does:</text>
  <text x="310" y="178" fill="#555" font-size="10.5">Architecture pattern,</text>
  <text x="310" y="192" fill="#555" font-size="10.5">holistic component overview</text>
  <text x="310" y="214" fill="#333" font-size="11" font-weight="600">Command: /propose-methodology</text>
  <text x="310" y="234" fill="#333" font-size="11" font-weight="600">Output:</text>
  <text x="310" y="250" fill="#555" font-size="10.5">phase2-methodology.md</text>
  <rect x="310" y="270" width="165" height="6" rx="3" fill="#E8E8E8"/>
  <rect x="310" y="270" width="82" height="6" rx="3" fill="#E67E22"/>

  <!-- Gate 2 -->
  <rect x="500" y="163" width="50" height="75" rx="6" fill="#E8F8F0" stroke="#27AE60" stroke-width="1.2"/>
  <text x="525" y="192" text-anchor="middle" fill="#1E8449" font-size="10" font-weight="700">GATE</text>
  <text x="525" y="207" text-anchor="middle" fill="#555" font-size="8">Accept</text>
  <text x="525" y="217" text-anchor="middle" fill="#555" font-size="8">approach</text>
  <text x="525" y="227" text-anchor="middle" fill="#555" font-size="8">or rethink</text>
  <line x1="490" y1="200" x2="500" y2="200" stroke="#1B5E8A" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- Phase 3 -->
  <rect x="560" y="100" width="195" height="195" rx="10" fill="#fff" stroke="#DDE5EE" stroke-width="1.2" filter="url(#ds)"/>
  <rect x="560" y="100" width="195" height="40" rx="10" fill="#1B5E8A"/>
  <rect x="560" y="120" width="195" height="20" fill="#1B5E8A"/>
  <text x="658" y="126" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">3 · Design</text>
  <text x="575" y="162" fill="#333" font-size="11" font-weight="600">What it does:</text>
  <text x="575" y="178" fill="#555" font-size="10.5">Detailed design per</text>
  <text x="575" y="192" fill="#555" font-size="10.5">component, one at a time</text>
  <text x="575" y="214" fill="#333" font-size="11" font-weight="600">Command: /design-component</text>
  <text x="575" y="234" fill="#333" font-size="11" font-weight="600">Output:</text>
  <text x="575" y="250" fill="#555" font-size="10.5">components/*.md</text>
  <rect x="575" y="270" width="165" height="6" rx="3" fill="#E8E8E8"/>
  <rect x="575" y="270" width="123" height="6" rx="3" fill="#E67E22"/>

  <!-- Gate 3 -->
  <rect x="765" y="163" width="50" height="75" rx="6" fill="#E8F8F0" stroke="#27AE60" stroke-width="1.2"/>
  <text x="790" y="192" text-anchor="middle" fill="#1E8449" font-size="10" font-weight="700">GATE</text>
  <text x="790" y="207" text-anchor="middle" fill="#555" font-size="8">All parts</text>
  <text x="790" y="217" text-anchor="middle" fill="#555" font-size="8">accepted</text>
  <text x="790" y="227" text-anchor="middle" fill="#555" font-size="8">to finalize</text>
  <line x1="755" y1="200" x2="765" y2="200" stroke="#1B5E8A" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- Phase 4 -->
  <rect x="825" y="100" width="115" height="195" rx="10" fill="#fff" stroke="#DDE5EE" stroke-width="1.2" filter="url(#ds)"/>
  <rect x="825" y="100" width="115" height="40" rx="10" fill="#27AE60"/>
  <rect x="825" y="120" width="115" height="20" fill="#27AE60"/>
  <text x="882" y="126" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">4 · Document</text>
  <text x="840" y="162" fill="#333" font-size="11" font-weight="600">Final output:</text>
  <text x="840" y="180" fill="#555" font-size="10.5">Consolidate all</text>
  <text x="840" y="194" fill="#555" font-size="10.5">decisions into</text>
  <text x="840" y="208" fill="#555" font-size="10.5">architecture</text>
  <text x="840" y="222" fill="#555" font-size="10.5">document</text>
  <text x="840" y="250" fill="#333" font-size="11" font-weight="600">/generate-docs</text>
  <rect x="840" y="270" width="85" height="6" rx="3" fill="#27AE60"/>

  <!-- Refine loops (below each phase) -->
  <path d="M 80 295 Q 80 335, 128 335 Q 175 335, 175 295" stroke="#999" stroke-width="1.2" fill="none" stroke-dasharray="4 3"/>
  <polygon points="80,300 75,308 85,308" fill="#999"/>
  <text x="128" y="352" text-anchor="middle" fill="#999" font-size="10">Refine loop</text>

  <path d="M 345 295 Q 345 335, 393 335 Q 440 335, 440 295" stroke="#999" stroke-width="1.2" fill="none" stroke-dasharray="4 3"/>
  <polygon points="345,300 340,308 350,308" fill="#999"/>
  <text x="393" y="352" text-anchor="middle" fill="#999" font-size="10">Refine loop</text>

  <path d="M 610 295 Q 610 335, 658 335 Q 705 335, 705 295" stroke="#999" stroke-width="1.2" fill="none" stroke-dasharray="4 3"/>
  <polygon points="610,300 605,308 615,308" fill="#999"/>
  <text x="658" y="352" text-anchor="middle" fill="#999" font-size="10">Refine loop</text>

  <!-- Startup / Enterprise guidance -->
  <rect x="50" y="378" width="400" height="50" rx="8" fill="#E8F8F0" stroke="#82E0AA" stroke-width="1"/>
  <text x="250" y="398" text-anchor="middle" fill="#1E8449" font-size="12" font-weight="700">For Startups</text>
  <text x="250" y="416" text-anchor="middle" fill="#555" font-size="10.5">Ship MVP first, add this when customers expect reliability</text>

  <rect x="510" y="378" width="400" height="50" rx="8" fill="#EBF5FB" stroke="#AED6F1" stroke-width="1"/>
  <text x="710" y="398" text-anchor="middle" fill="#1B5E8A" font-size="12" font-weight="700">For Enterprises</text>
  <text x="710" y="416" text-anchor="middle" fill="#555" font-size="10.5">Speed up review to match AI-accelerated development</text>
</svg>
