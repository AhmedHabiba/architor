<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 520" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <filter id="ds" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 8" refX="10" refY="4" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#1B5E8A"/>
    </marker>
    <marker id="arR" viewBox="0 0 10 8" refX="10" refY="4" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#C0392B"/>
    </marker>
  </defs>

  <rect width="1080" height="520" rx="12" fill="#F7F9FC"/>

  <text x="540" y="34" text-anchor="middle" fill="#0F3652" font-size="20" font-weight="700">Phase-Gated Workflow — PRD to Architecture Document</text>

  <!-- Core principle banner -->
  <rect x="260" y="48" width="560" height="28" rx="14" fill="#fff" stroke="#1B5E8A" stroke-width="1.2"/>
  <text x="540" y="67" text-anchor="middle" fill="#1B5E8A" font-size="12" font-weight="600">Core Principle: AI proposes and challenges · Human decides at every gate</text>

  <!-- Phase 1 -->
  <rect x="20" y="95" width="160" height="210" rx="10" fill="#fff" stroke="#DDE5EE" stroke-width="1.2" filter="url(#ds)"/>
  <rect x="20" y="95" width="160" height="38" rx="10" fill="#1B5E8A"/>
  <rect x="20" y="113" width="160" height="20" fill="#1B5E8A"/>
  <text x="100" y="120" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">1 · Evaluate</text>
  <text x="32" y="155" fill="#333" font-size="10.5" font-weight="600">What it does:</text>
  <text x="32" y="170" fill="#555" font-size="10">Analyze PRD, extract reqs,</text>
  <text x="32" y="183" fill="#555" font-size="10">identify gaps and risks</text>
  <text x="32" y="200" fill="#333" font-size="10.5" font-weight="600">/analyze-prd</text>
  <text x="32" y="218" fill="#555" font-size="10">Includes discovery interview</text>
  <text x="32" y="231" fill="#555" font-size="10">if org-context is empty</text>
  <!-- Progress bar -->
  <rect x="32" y="280" width="136" height="6" rx="3" fill="#E8E8E8"/>
  <rect x="32" y="280" width="34" height="6" rx="3" fill="#F5B041"/>

  <!-- Gate 1 -->
  <rect x="190" y="170" width="44" height="60" rx="6" fill="#E8F8F0" stroke="#27AE60" stroke-width="1.2"/>
  <text x="212" y="195" text-anchor="middle" fill="#1E8449" font-size="9" font-weight="700">GATE</text>
  <text x="212" y="208" text-anchor="middle" fill="#555" font-size="7.5">Accept</text>
  <text x="212" y="218" text-anchor="middle" fill="#555" font-size="7.5">analysis</text>
  <line x1="180" y1="200" x2="190" y2="200" stroke="#1B5E8A" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- Phase 2 container -->
  <rect x="244" y="95" width="440" height="210" rx="10" fill="#fff" stroke="#DDE5EE" stroke-width="1.2" filter="url(#ds)"/>
  <rect x="244" y="95" width="440" height="38" rx="10" fill="#1B5E8A"/>
  <rect x="244" y="113" width="440" height="20" fill="#1B5E8A"/>
  <text x="464" y="120" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">2 · Decide (/propose-methodology auto-routes)</text>

  <!-- Sub-phase 2A -->
  <rect x="258" y="145" width="120" height="70" rx="7" fill="#EBF5FB" stroke="#1B5E8A" stroke-width="1"/>
  <text x="318" y="165" text-anchor="middle" fill="#1B5E8A" font-size="11" font-weight="700">2A Pattern</text>
  <text x="318" y="180" text-anchor="middle" fill="#555" font-size="9">Architecture</text>
  <text x="318" y="192" text-anchor="middle" fill="#555" font-size="9">pattern + rationale</text>

  <!-- Mini gate 2A→2B -->
  <rect x="387" y="162" width="30" height="36" rx="4" fill="#E8F8F0" stroke="#27AE60" stroke-width="1"/>
  <text x="402" y="184" text-anchor="middle" fill="#1E8449" font-size="7" font-weight="700">GATE</text>
  <line x1="378" y1="180" x2="387" y2="180" stroke="#1B5E8A" stroke-width="1.2" marker-end="url(#ar)"/>

  <!-- Sub-phase 2B -->
  <rect x="426" y="145" width="120" height="70" rx="7" fill="#EBF5FB" stroke="#1B5E8A" stroke-width="1"/>
  <text x="486" y="165" text-anchor="middle" fill="#1B5E8A" font-size="11" font-weight="700">2B Components</text>
  <text x="486" y="180" text-anchor="middle" fill="#555" font-size="9">Holistic component</text>
  <text x="486" y="192" text-anchor="middle" fill="#555" font-size="9">map + dependencies</text>
  <line x1="417" y1="180" x2="426" y2="180" stroke="#1B5E8A" stroke-width="1.2" marker-end="url(#ar)"/>

  <!-- Sub-phase 2C -->
  <rect x="258" y="225" width="288" height="62" rx="7" fill="#FEF9E7" stroke="#D4AC0D" stroke-width="1"/>
  <text x="402" y="245" text-anchor="middle" fill="#7D6608" font-size="11" font-weight="700">2C Cross-Cutting Decisions</text>
  <text x="402" y="260" text-anchor="middle" fill="#555" font-size="9">Auth · Observability · Deployment · Error Handling · Data Management</text>
  <text x="402" y="275" text-anchor="middle" fill="#999" font-size="8" font-style="italic">Constraints that all Phase 3 components must comply with</text>

  <!-- Arrow from 2B down to 2C -->
  <line x1="486" y1="215" x2="486" y2="225" stroke="#1B5E8A" stroke-width="1.2" marker-end="url(#ar)"/>

  <!-- Mini gate after 2C -->
  <rect x="555" y="237" width="30" height="36" rx="4" fill="#E8F8F0" stroke="#27AE60" stroke-width="1"/>
  <text x="570" y="259" text-anchor="middle" fill="#1E8449" font-size="7" font-weight="700">GATE</text>
  <line x1="546" y1="255" x2="555" y2="255" stroke="#1B5E8A" stroke-width="1.2" marker-end="url(#ar)"/>

  <!-- Progress bar Phase 2 -->
  <rect x="600" y="280" width="72" height="6" rx="3" fill="#E8E8E8"/>
  <rect x="600" y="280" width="36" height="6" rx="3" fill="#E67E22"/>

  <!-- Gate 2 (overall) -->
  <rect x="694" y="170" width="44" height="60" rx="6" fill="#E8F8F0" stroke="#27AE60" stroke-width="1.2"/>
  <text x="716" y="195" text-anchor="middle" fill="#1E8449" font-size="9" font-weight="700">GATE</text>
  <text x="716" y="208" text-anchor="middle" fill="#555" font-size="7.5">All 2A+</text>
  <text x="716" y="218" text-anchor="middle" fill="#555" font-size="7.5">2B+2C</text>
  <line x1="684" y1="200" x2="694" y2="200" stroke="#1B5E8A" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- Phase 3 -->
  <rect x="748" y="95" width="160" height="210" rx="10" fill="#fff" stroke="#DDE5EE" stroke-width="1.2" filter="url(#ds)"/>
  <rect x="748" y="95" width="160" height="38" rx="10" fill="#1B5E8A"/>
  <rect x="748" y="113" width="160" height="20" fill="#1B5E8A"/>
  <text x="828" y="120" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">3 · Design</text>
  <text x="760" y="155" fill="#333" font-size="10.5" font-weight="600">What it does:</text>
  <text x="760" y="170" fill="#555" font-size="10">Detailed design per</text>
  <text x="760" y="183" fill="#555" font-size="10">component, one at a time</text>
  <text x="760" y="200" fill="#333" font-size="10.5" font-weight="600">/design-component</text>
  <text x="760" y="218" fill="#555" font-size="10">Must comply with 2C</text>
  <text x="760" y="231" fill="#555" font-size="10">cross-cutting constraints</text>
  <rect x="760" y="280" width="136" height="6" rx="3" fill="#E8E8E8"/>
  <rect x="760" y="280" width="102" height="6" rx="3" fill="#E67E22"/>

  <!-- Gate 3 -->
  <rect x="918" y="170" width="44" height="60" rx="6" fill="#E8F8F0" stroke="#27AE60" stroke-width="1.2"/>
  <text x="940" y="195" text-anchor="middle" fill="#1E8449" font-size="9" font-weight="700">GATE</text>
  <text x="940" y="208" text-anchor="middle" fill="#555" font-size="7.5">All parts</text>
  <text x="940" y="218" text-anchor="middle" fill="#555" font-size="7.5">accepted</text>
  <line x1="908" y1="200" x2="918" y2="200" stroke="#1B5E8A" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- Phase 4 -->
  <rect x="972" y="95" width="95" height="210" rx="10" fill="#fff" stroke="#DDE5EE" stroke-width="1.2" filter="url(#ds)"/>
  <rect x="972" y="95" width="95" height="38" rx="10" fill="#27AE60"/>
  <rect x="972" y="113" width="95" height="20" fill="#27AE60"/>
  <text x="1020" y="120" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">4 · Document</text>
  <text x="982" y="155" fill="#333" font-size="10" font-weight="600">Validate</text>
  <text x="982" y="170" fill="#555" font-size="9.5">End-to-end</text>
  <text x="982" y="183" fill="#555" font-size="9.5">simulation</text>
  <text x="982" y="200" fill="#333" font-size="10" font-weight="600">Generate</text>
  <text x="982" y="215" fill="#555" font-size="9.5">Architecture</text>
  <text x="982" y="228" fill="#555" font-size="9.5">document</text>
  <text x="982" y="250" fill="#333" font-size="10" font-weight="600">/generate-docs</text>
  <rect x="982" y="280" width="72" height="6" rx="3" fill="#27AE60"/>

  <!-- Refine loops -->
  <path d="M 55 305 Q 55 335, 100 335 Q 145 335, 145 305" stroke="#999" stroke-width="1.2" fill="none" stroke-dasharray="4 3"/>
  <polygon points="55,308 50,316 60,316" fill="#999"/>
  <text x="100" y="350" text-anchor="middle" fill="#999" font-size="9">Refine loop</text>

  <path d="M 390 305 Q 390 335, 464 335 Q 535 335, 535 305" stroke="#999" stroke-width="1.2" fill="none" stroke-dasharray="4 3"/>
  <polygon points="390,308 385,316 395,316" fill="#999"/>
  <text x="464" y="350" text-anchor="middle" fill="#999" font-size="9">Refine loop</text>

  <path d="M 790 305 Q 790 335, 828 335 Q 865 335, 865 305" stroke="#999" stroke-width="1.2" fill="none" stroke-dasharray="4 3"/>
  <polygon points="790,308 785,316 795,316" fill="#999"/>
  <text x="828" y="350" text-anchor="middle" fill="#999" font-size="9">Refine loop</text>

  <!-- Reopen arrow (backward) -->
  <path d="M 748 310 Q 680 400, 464 400 Q 244 400, 244 310" stroke="#C0392B" stroke-width="1.8" fill="none" stroke-dasharray="6 4" marker-end="url(#arR)"/>
  <rect x="400" y="390" width="130" height="22" rx="11" fill="#FDEDEC" stroke="#C0392B" stroke-width="1"/>
  <text x="465" y="405" text-anchor="middle" fill="#C0392B" font-size="10" font-weight="600">/reopen (max 2)</text>
  <text x="465" y="425" text-anchor="middle" fill="#999" font-size="9">Cascading: un-accepts downstream phases</text>

  <!-- Startup / Enterprise guidance -->
  <rect x="40" y="450" width="480" height="50" rx="8" fill="#E8F8F0" stroke="#82E0AA" stroke-width="1"/>
  <text x="280" y="472" text-anchor="middle" fill="#1E8449" font-size="12" font-weight="700">For Startups</text>
  <text x="280" y="489" text-anchor="middle" fill="#555" font-size="10.5">Ship MVP first, add this when customers expect reliability</text>

  <rect x="560" y="450" width="480" height="50" rx="8" fill="#EBF5FB" stroke="#AED6F1" stroke-width="1"/>
  <text x="800" y="472" text-anchor="middle" fill="#1B5E8A" font-size="12" font-weight="700">For Enterprises</text>
  <text x="800" y="489" text-anchor="middle" fill="#555" font-size="10.5">Speed up review to match AI-accelerated development</text>
</svg>
