<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <filter id="ds" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2.5" flood-opacity="0.07"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 8" refX="10" refY="4" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#1B5E8A"/>
    </marker>
    <marker id="arrowDown" viewBox="0 0 8 10" refX="4" refY="10" markerWidth="6" markerHeight="8" orient="auto">
      <polygon points="0 0, 8 0, 4 10" fill="#1B5E8A"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="560" rx="12" fill="#F7F9FC"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" fill="#0F3652" font-size="20" font-weight="700">System Architecture — How the Pieces Fit Together</text>

  <!-- CLAUDE.md top box -->
  <rect x="320" y="58" width="260" height="56" rx="10" fill="#0F3652" filter="url(#ds)"/>
  <text x="450" y="82" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">CLAUDE.md</text>
  <text x="450" y="100" text-anchor="middle" fill="#8BB8D6" font-size="11">Identity · Phase Rules · File Map</text>

  <!-- Arrow CLAUDE.md → Commands -->
  <line x1="450" y1="114" x2="450" y2="140" stroke="#1B5E8A" stroke-width="2" marker-end="url(#arrowDown)"/>

  <!-- Slash Commands row -->
  <rect x="40" y="145" width="820" height="90" rx="10" fill="#fff" stroke="#DDE5EE" stroke-width="1.2" filter="url(#ds)"/>
  <text x="450" y="170" text-anchor="middle" fill="#1B5E8A" font-size="14" font-weight="700">Slash Commands — User-Invoked Phase Controls</text>

  <!-- Phase commands -->
  <rect x="60" y="183" width="110" height="36" rx="6" fill="#EBF5FB" stroke="#1B5E8A" stroke-width="1"/>
  <text x="115" y="206" text-anchor="middle" fill="#1B5E8A" font-size="10.5" font-weight="600">/analyze-prd</text>
  <rect x="180" y="183" width="130" height="36" rx="6" fill="#EBF5FB" stroke="#1B5E8A" stroke-width="1"/>
  <text x="245" y="206" text-anchor="middle" fill="#1B5E8A" font-size="10.5" font-weight="600">/propose-methodology</text>
  <rect x="320" y="183" width="130" height="36" rx="6" fill="#EBF5FB" stroke="#1B5E8A" stroke-width="1"/>
  <text x="385" y="206" text-anchor="middle" fill="#1B5E8A" font-size="10.5" font-weight="600">/design-component</text>
  <rect x="460" y="183" width="110" height="36" rx="6" fill="#EBF5FB" stroke="#1B5E8A" stroke-width="1"/>
  <text x="515" y="206" text-anchor="middle" fill="#1B5E8A" font-size="10.5" font-weight="600">/generate-docs</text>

  <!-- Decision commands -->
  <rect x="590" y="183" width="70" height="36" rx="6" fill="#E8F8F0" stroke="#27AE60" stroke-width="1"/>
  <text x="625" y="206" text-anchor="middle" fill="#1E8449" font-size="10.5" font-weight="600">/accept</text>
  <rect x="670" y="183" width="65" height="36" rx="6" fill="#FEF9E7" stroke="#D4AC0D" stroke-width="1"/>
  <text x="702" y="206" text-anchor="middle" fill="#7D6608" font-size="10.5" font-weight="600">/refine</text>
  <rect x="745" y="183" width="95" height="36" rx="6" fill="#FDEDEC" stroke="#E74C3C" stroke-width="1"/>
  <text x="792" y="206" text-anchor="middle" fill="#C0392B" font-size="10.5" font-weight="600">/alternative</text>

  <!-- Arrows down from commands -->
  <line x1="250" y1="235" x2="250" y2="275" stroke="#1B5E8A" stroke-width="2" marker-end="url(#arrowDown)"/>
  <line x1="650" y1="235" x2="650" y2="275" stroke="#1B5E8A" stroke-width="2" marker-end="url(#arrowDown)"/>

  <!-- Skills box -->
  <rect x="40" y="280" width="400" height="130" rx="10" fill="#fff" stroke="#DDE5EE" stroke-width="1.2" filter="url(#ds)"/>
  <text x="240" y="305" text-anchor="middle" fill="#7D6608" font-size="14" font-weight="700">Skills — Auto-Activating</text>
  <text x="240" y="320" text-anchor="middle" fill="#999" font-size="10" font-style="italic">Claude activates these by context, no user command needed</text>

  <rect x="60" y="332" width="175" height="28" rx="5" fill="#FEF9E7"/>
  <text x="147" y="351" text-anchor="middle" fill="#7D6608" font-size="10.5">architecture-methodology</text>
  <rect x="60" y="366" width="175" height="28" rx="5" fill="#FEF9E7"/>
  <text x="147" y="385" text-anchor="middle" fill="#7D6608" font-size="10.5">architecture-patterns</text>
  <rect x="248" y="332" width="175" height="28" rx="5" fill="#FEF9E7"/>
  <text x="335" y="351" text-anchor="middle" fill="#7D6608" font-size="10.5">challenge-assumptions</text>
  <rect x="248" y="366" width="175" height="28" rx="5" fill="#FEF9E7"/>
  <text x="335" y="385" text-anchor="middle" fill="#7D6608" font-size="10.5">state-manager</text>

  <!-- Hooks box -->
  <rect x="460" y="280" width="400" height="130" rx="10" fill="#fff" stroke="#DDE5EE" stroke-width="1.2" filter="url(#ds)"/>
  <text x="660" y="305" text-anchor="middle" fill="#C0392B" font-size="14" font-weight="700">Hooks — Hard Enforcement</text>
  <text x="660" y="320" text-anchor="middle" fill="#999" font-size="10" font-style="italic">Python scripts · exit 1 = blocked · no prompt can bypass</text>

  <rect x="480" y="338" width="175" height="52" rx="6" fill="#FDEDEC" stroke="#E74C3C" stroke-width="1"/>
  <text x="567" y="358" text-anchor="middle" fill="#C0392B" font-size="11" font-weight="600">validate-transition.py</text>
  <text x="567" y="378" text-anchor="middle" fill="#888" font-size="9.5">PreToolUse — blocks illegal</text>
  <text x="567" y="389" text-anchor="middle" fill="#888" font-size="9.5">phase transitions on write</text>

  <rect x="668" y="338" width="175" height="52" rx="6" fill="#FDEDEC" stroke="#E74C3C" stroke-width="1"/>
  <text x="755" y="358" text-anchor="middle" fill="#C0392B" font-size="11" font-weight="600">log-decision.py</text>
  <text x="755" y="378" text-anchor="middle" fill="#888" font-size="9.5">PostToolUse — auto-records</text>
  <text x="755" y="389" text-anchor="middle" fill="#888" font-size="9.5">state changes to log</text>

  <!-- Arrows down to state -->
  <line x1="240" y1="410" x2="240" y2="445" stroke="#1B5E8A" stroke-width="2" marker-end="url(#arrowDown)"/>
  <line x1="660" y1="410" x2="660" y2="445" stroke="#1B5E8A" stroke-width="2" marker-end="url(#arrowDown)"/>

  <!-- State layer -->
  <rect x="40" y="450" width="820" height="90" rx="10" fill="#0F3652" filter="url(#ds)"/>
  <text x="450" y="478" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">.arch/ — File-Based State (Survives /clear, Restarts, Compaction)</text>

  <rect x="70" y="495" width="100" height="28" rx="5" fill="#1B5E8A"/>
  <text x="120" y="514" text-anchor="middle" fill="#fff" font-size="10.5" font-weight="600">state.json</text>
  <rect x="185" y="495" width="80" height="28" rx="5" fill="#1B5E8A"/>
  <text x="225" y="514" text-anchor="middle" fill="#fff" font-size="10.5">prd.md</text>
  <rect x="280" y="495" width="115" height="28" rx="5" fill="#1B5E8A"/>
  <text x="337" y="514" text-anchor="middle" fill="#fff" font-size="10.5">org-context.md</text>
  <rect x="410" y="495" width="105" height="28" rx="5" fill="#1B5E8A"/>
  <text x="462" y="514" text-anchor="middle" fill="#fff" font-size="10.5">decisions.md</text>
  <rect x="530" y="495" width="105" height="28" rx="5" fill="#1B5E8A"/>
  <text x="582" y="514" text-anchor="middle" fill="#fff" font-size="10.5">components/</text>
  <rect x="650" y="495" width="90" height="28" rx="5" fill="#1B5E8A"/>
  <text x="695" y="514" text-anchor="middle" fill="#fff" font-size="10.5">reviews/</text>
  <rect x="755" y="495" width="90" height="28" rx="5" fill="#27AE60"/>
  <text x="800" y="514" text-anchor="middle" fill="#fff" font-size="10.5">output/</text>
</svg>
