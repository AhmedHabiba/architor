  <line x1="250" y1="235" x2="250" y2="275" stroke="#1B5E8A" stroke-width="2" marker-end="url(#arrowDown)"/>
  <line x1="680" y1="235" x2="680" y2="275" stroke="#1B5E8A" stroke-width="2" marker-end="url(#arrowDown)"/>

  <!-- Skills box -->
  <rect x="30" y="280" width="430" height="130" rx="10" fill="#fff" stroke="#DDE5EE" stroke-width="1.2" filter="url(#ds)"/>
  <text x="245" y="305" text-anchor="middle" fill="#7D6608" font-size="14" font-weight="700">Skills — Auto-Activating</text>
  <text x="245" y="320" text-anchor="middle" fill="#999" font-size="10" font-style="italic">Claude activates these by context, no user command needed</text>

  <rect x="48" y="332" width="195" height="28" rx="5" fill="#FEF9E7"/>
  <text x="145" y="351" text-anchor="middle" fill="#7D6608" font-size="10.5">architecture-methodology</text>
  <rect x="48" y="366" width="195" height="28" rx="5" fill="#FEF9E7"/>
  <text x="145" y="385" text-anchor="middle" fill="#7D6608" font-size="10.5">architecture-patterns</text>
  <rect x="250" y="332" width="195" height="28" rx="5" fill="#FEF9E7"/>
  <text x="347" y="351" text-anchor="middle" fill="#7D6608" font-size="10.5">challenge-assumptions</text>
  <rect x="250" y="366" width="195" height="28" rx="5" fill="#FEF9E7"/>
  <text x="347" y="385" text-anchor="middle" fill="#7D6608" font-size="10.5">state-manager</text>

  <!-- Hooks box -->
  <rect x="480" y="280" width="430" height="130" rx="10" fill="#fff" stroke="#DDE5EE" stroke-width="1.2" filter="url(#ds)"/>
  <text x="695" y="305" text-anchor="middle" fill="#C0392B" font-size="14" font-weight="700">Hooks — Hard Enforcement</text>
  <text x="695" y="320" text-anchor="middle" fill="#999" font-size="10" font-style="italic">Python scripts · exit 1 = blocked · no prompt can bypass</text>

  <rect x="498" y="338" width="195" height="52" rx="6" fill="#FDEDEC" stroke="#E74C3C" stroke-width="1"/>
  <text x="595" y="358" text-anchor="middle" fill="#C0392B" font-size="11" font-weight="600">validate-transition.py</text>
  <text x="595" y="374" text-anchor="middle" fill="#888" font-size="9">PreToolUse — schema, phase gates,</text>
  <text x="595" y="385" text-anchor="middle" fill="#888" font-size="9">reopen limits, injection blocks</text>

  <rect x="700" y="338" width="195" height="52" rx="6" fill="#FDEDEC" stroke="#E74C3C" stroke-width="1"/>
  <text x="797" y="358" text-anchor="middle" fill="#C0392B" font-size="11" font-weight="600">log-decision.py</text>
  <text x="797" y="374" text-anchor="middle" fill="#888" font-size="9">PostToolUse — auto-records</text>
  <text x="797" y="385" text-anchor="middle" fill="#888" font-size="9">state changes to log</text>

  <!-- Arrows down to state -->
  <line x1="245" y1="410" x2="245" y2="445" stroke="#1B5E8A" stroke-width="2" marker-end="url(#arrowDown)"/>
  <line x1="695" y1="410" x2="695" y2="445" stroke="#1B5E8A" stroke-width="2" marker-end="url(#arrowDown)"/>

  <!-- State layer -->
  <rect x="30" y="450" width="880" height="90" rx="10" fill="#0F3652" filter="url(#ds)"/>
  <text x="470" y="478" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">.arch/ — File-Based State (Survives /clear, Restarts, Compaction)</text>

  <rect x="50" y="495" width="90" height="28" rx="5" fill="#1B5E8A"/>
  <text x="95" y="514" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">state.json</text>
  <rect x="150" y="495" width="70" height="28" rx="5" fill="#1B5E8A"/>
  <text x="185" y="514" text-anchor="middle" fill="#fff" font-size="10">prd.md</text>
  <rect x="228" y="495" width="105" height="28" rx="5" fill="#1B5E8A"/>
  <text x="280" y="514" text-anchor="middle" fill="#fff" font-size="10">org-context.md</text>
  <rect x="341" y="495" width="100" height="28" rx="5" fill="#1B5E8A"/>
  <text x="391" y="514" text-anchor="middle" fill="#fff" font-size="10">decisions.md</text>
  <rect x="449" y="495" width="100" height="28" rx="5" fill="#1B5E8A"/>
  <text x="499" y="514" text-anchor="middle" fill="#fff" font-size="10">components/</text>
  <rect x="557" y="495" width="80" height="28" rx="5" fill="#1B5E8A"/>
  <text x="597" y="514" text-anchor="middle" fill="#fff" font-size="10">reviews/</text>
  <rect x="645" y="495" width="120" height="28" rx="5" fill="#1B5E8A"/>
  <text x="705" y="514" text-anchor="middle" fill="#fff" font-size="10">cross-cutting.md</text>
  <rect x="773" y="495" width="80" height="28" rx="5" fill="#27AE60"/>
  <text x="813" y="514" text-anchor="middle" fill="#fff" font-size="10">output/</text>
</svg>
