<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 560" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <filter id="ds" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2.5" flood-opacity="0.07"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 8" refX="10" refY="4" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#1B5E8A"/>
    </marker>
    <marker id="arrowDown" viewBox="0 0 8 10" refX="4" refY="10" markerWidth="6" markerHeight="8" orient="auto">
      <polygon points="0 0, 8 0, 4 10" fill="#1B5E8A"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="940" height="560" rx="12" fill="#F7F9FC"/>

  <!-- Title -->
  <text x="470" y="38" text-anchor="middle" fill="#0F3652" font-size="20" font-weight="700">System Architecture — How the Pieces Fit Together</text>

  <!-- CLAUDE.md top box -->
  <rect x="340" y="58" width="260" height="56" rx="10" fill="#0F3652" filter="url(#ds)"/>
  <text x="470" y="82" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">CLAUDE.md</text>
  <text x="470" y="100" text-anchor="middle" fill="#8BB8D6" font-size="11">Identity · Phase Rules · Reopen Rules · File Map</text>

  <!-- Arrow CLAUDE.md -> Commands -->
  <line x1="470" y1="114" x2="470" y2="140" stroke="#1B5E8A" stroke-width="2" marker-end="url(#arrowDown)"/>

  <!-- Slash Commands row -->
  <rect x="30" y="145" width="880" height="90" rx="10" fill="#fff" stroke="#DDE5EE" stroke-width="1.2" filter="url(#ds)"/>
  <text x="470" y="170" text-anchor="middle" fill="#1B5E8A" font-size="14" font-weight="700">Slash Commands — User-Invoked Phase Controls (14 commands)</text>

  <!-- Phase commands -->
  <rect x="45" y="183" width="100" height="36" rx="6" fill="#EBF5FB" stroke="#1B5E8A" stroke-width="1"/>
  <text x="95" y="206" text-anchor="middle" fill="#1B5E8A" font-size="10" font-weight="600">/analyze-prd</text>
  <rect x="152" y="183" width="125" height="36" rx="6" fill="#EBF5FB" stroke="#1B5E8A" stroke-width="1"/>
  <text x="214" y="206" text-anchor="middle" fill="#1B5E8A" font-size="10" font-weight="600">/propose-methodology</text>
  <rect x="284" y="183" width="120" height="36" rx="6" fill="#EBF5FB" stroke="#1B5E8A" stroke-width="1"/>
  <text x="344" y="206" text-anchor="middle" fill="#1B5E8A" font-size="10" font-weight="600">/design-component</text>
  <rect x="411" y="183" width="100" height="36" rx="6" fill="#EBF5FB" stroke="#1B5E8A" stroke-width="1"/>
  <text x="461" y="206" text-anchor="middle" fill="#1B5E8A" font-size="10" font-weight="600">/generate-docs</text>

  <!-- Decision commands -->
  <rect x="525" y="183" width="65" height="36" rx="6" fill="#E8F8F0" stroke="#27AE60" stroke-width="1"/>
  <text x="557" y="206" text-anchor="middle" fill="#1E8449" font-size="10" font-weight="600">/accept</text>
  <rect x="597" y="183" width="60" height="36" rx="6" fill="#FEF9E7" stroke="#D4AC0D" stroke-width="1"/>
  <text x="627" y="206" text-anchor="middle" fill="#7D6608" font-size="10" font-weight="600">/refine</text>
  <rect x="664" y="183" width="85" height="36" rx="6" fill="#FEF9E7" stroke="#D4AC0D" stroke-width="1"/>
  <text x="706" y="206" text-anchor="middle" fill="#7D6608" font-size="10" font-weight="600">/alternative</text>
  <rect x="756" y="183" width="70" height="36" rx="6" fill="#FDEDEC" stroke="#C0392B" stroke-width="1"/>
  <text x="791" y="206" text-anchor="middle" fill="#C0392B" font-size="10" font-weight="600">/reopen</text>
  <rect x="833" y="183" width="63" height="36" rx="6" fill="#F7F9FC" stroke="#BBB" stroke-width="1"/>
  <text x="864" y="206" text-anchor="middle" fill="#555" font-size="10" font-weight="600">/status</text>

